name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends ninja-build qtbase5-dev
      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target tgraph --parallel 2
      - name: Package
        run: |
          mkdir -p package/TortoiseGit-RevisionGraph-CrossPaltform-linux-x86_64
          cp build/tgraph README.md LICENSE package/TortoiseGit-RevisionGraph-CrossPaltform-linux-x86_64/
          tar -C package -czf TortoiseGit-RevisionGraph-CrossPaltform-linux-x86_64.tar.gz TortoiseGit-RevisionGraph-CrossPaltform-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: TortoiseGit-RevisionGraph-CrossPaltform-linux-x86_64
          path: TortoiseGit-RevisionGraph-CrossPaltform-linux-x86_64.tar.gz

  windows:
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          arch: win64_msvc2019_64
          cache: true
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release --target tgraph --parallel 2
      - name: Package
        shell: pwsh
        run: |
          $dir = 'TortoiseGit-RevisionGraph-CrossPaltform-windows-x86_64'
          New-Item -ItemType Directory -Path $dir
          Copy-Item build/Release/tgraph.exe, README.md, LICENSE -Destination $dir
          windeployqt --release --no-translations "$dir/tgraph.exe"
          Compress-Archive -Path $dir -DestinationPath "$dir.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: TortoiseGit-RevisionGraph-CrossPaltform-windows-x86_64
          path: TortoiseGit-RevisionGraph-CrossPaltform-windows-x86_64.zip

  macos:
    runs-on: macos-15-intel
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          cache: true
      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target tgraph --parallel 2
      - name: Package
        run: |
          macdeployqt build/tgraph.app
          ditto -c -k --sequesterRsrc --keepParent build/tgraph.app TortoiseGit-RevisionGraph-CrossPaltform-macos-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: TortoiseGit-RevisionGraph-CrossPaltform-macos-x86_64
          path: TortoiseGit-RevisionGraph-CrossPaltform-macos-x86_64.zip
